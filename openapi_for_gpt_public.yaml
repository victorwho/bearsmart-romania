openapi: 3.1.0
info:
  title: Revox Routine API
  description: Public Revox routine recommendation API schema for GPT Actions. This
    contract is intentionally limited to the endpoints the GPT should call.
  version: 1.3.0-public
paths:
  /retailer-links/{retailer}:
    get:
      tags:
      - meta
      summary: Retailer Link
      operationId: getRetailerLink
      parameters:
      - name: retailer
        in: path
        required: true
        schema:
          type: string
          title: Retailer
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetailerLinkResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /products/{product_id}:
    get:
      tags:
      - catalog
      summary: Get Product
      operationId: getProductById
      parameters:
      - name: product_id
        in: path
        required: true
        schema:
          type: string
          title: Product Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /routine/recommend:
    post:
      tags:
      - routine
      summary: Recommend Routine
      operationId: recommendRoutine
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoutineRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      x-openai-isConsequential: false
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    PhaseRoutine:
      properties:
        phase:
          type: string
          enum:
          - AM
          - PM
          title: Phase
        products:
          items:
            $ref: '#/components/schemas/SlotProduct'
          type: array
          title: Products
        missing_slots:
          items:
            type: string
          type: array
          title: Missing Slots
        notes:
          items:
            type: string
          type: array
          title: Notes
      type: object
      required:
      - phase
      title: PhaseRoutine
    ProductResponse:
      properties:
        id_produs:
          type: string
          title: Id Produs
          description: Internal stable product ID
        nume_produs:
          type: string
          title: Nume Produs
          description: Exact product name from database
        tip_produs:
          type: string
          title: Tip Produs
        needs:
          items:
            type: string
          type: array
          title: Needs
        skin_types:
          items:
            type: string
          type: array
          title: Skin Types
        retailer_disponibil:
          items:
            type: string
          type: array
          title: Retailer Disponibil
        moment_utilizare:
          type: string
          title: Moment Utilizare
        hidratant:
          type: boolean
          title: Hidratant
        curatare:
          type: boolean
          title: Curatare
        soare:
          type: boolean
          title: Soare
        are_retinol:
          type: boolean
          title: Are Retinol
        nu_combina_cu:
          items:
            type: string
          type: array
          title: Nu Combina Cu
        descriere:
          anyOf:
          - type: string
          - type: 'null'
          title: Descriere
        ingrediente:
          anyOf:
          - type: string
          - type: 'null'
          title: Ingrediente
      type: object
      required:
      - id_produs
      - nume_produs
      - tip_produs
      - needs
      - skin_types
      - retailer_disponibil
      - moment_utilizare
      - hidratant
      - curatare
      - soare
      - are_retinol
      - nu_combina_cu
      title: ProductResponse
    RetailerLinkResponse:
      properties:
        retailer:
          type: string
          title: Retailer
          description: Canonical retailer name
        mode:
          type: string
          enum:
          - url
          - in_store_only
          title: Mode
          description: How purchase is handled
        url:
          anyOf:
          - type: string
          - type: 'null'
          title: Url
          description: Direct purchase/search URL if available
        cta_text:
          type: string
          title: Cta Text
          description: Recommended call-to-action text for the GPT UI
        source_label:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Label
          description: Raw retailer label as seen in links.txt
        notes:
          items:
            type: string
          type: array
          title: Notes
      type: object
      required:
      - retailer
      - mode
      - cta_text
      title: RetailerLinkResponse
    RoutineRequest:
      properties:
        retailer:
          type: string
          enum:
          - DM
          - Farmacia Tei
          - Bebe Tei
          - eMag
          - Dr. Max
          - Douglas
          - Sephora
          - Marionnaud
          - Kaufland
          - Auchan
          - Carrefour
          title: Retailer
          description: Retailer chosen by the user.
        skin_type:
          type: string
          enum:
          - Normal
          - Uscat
          - Gras
          - Ten Mixt
          - Sensibil
          title: Skin Type
          description: User skin type.
        priority_need:
          type: string
          enum:
          - Ten tern
          - Deshidratare
          - Acnee
          - Ten neuniform
          - Imperfectiuni
          - Riduri/linii fine
          - Ochi obositi/umflati
          - Roseata
          - Pete pigmentare
          title: Priority Need
          description: Main concern selected by the user.
        scores:
          $ref: '#/components/schemas/RoutineScores'
          description: Estimated concern scores from the selfie analysis. Always pass
            'Riduri/linii fine' when wrinkles are estimated. If 'Riduri/linii fine'
            is above 60, the API can recommend PM-only retinol.
        detected_needs:
          items:
            type: string
            enum:
            - Ten tern
            - Deshidratare
            - Acnee
            - Ten neuniform
            - Imperfectiuni
            - Riduri/linii fine
            - Ochi obositi/umflati
            - Roseata
            - Pete pigmentare
          type: array
          title: Detected Needs
          description: All detected concerns, if available.
        eye_need:
          anyOf:
          - type: string
            enum:
            - Ochi obositi/umflati
            - Riduri/linii fine
          - type: 'null'
          title: Eye Need
          description: Optional eye-area priority when relevant.
        allow_partial_routine:
          type: boolean
          title: Allow Partial Routine
          description: Set to true to allow partial routines when some slots cannot
            be filled.
          default: true
        include_debug:
          type: boolean
          title: Include Debug
          description: Set to true only for internal debugging.
          default: false
      additionalProperties: false
      type: object
      required:
      - retailer
      - skin_type
      - priority_need
      title: RoutineRequest
      examples:
      - allow_partial_routine: true
        detected_needs:
        - Imperfectiuni
        - Riduri/linii fine
        priority_need: Imperfectiuni
        retailer: Douglas
        scores:
          Imperfectiuni: 61
          Riduri/linii fine: 72
        skin_type: Normal
      - allow_partial_routine: true
        priority_need: Riduri/linii fine
        retailer: Sephora
        scores:
          Riduri/linii fine: 68
        skin_type: Ten Mixt
    RoutineResponse:
      properties:
        status:
          type: string
          enum:
          - ok
          - no_products
          - needs_other_retailer
          - partial
          title: Status
        retailer:
          type: string
          title: Retailer
        priority_need:
          type: string
          title: Priority Need
        skin_type:
          type: string
          title: Skin Type
        morning_routine:
          anyOf:
          - $ref: '#/components/schemas/PhaseRoutine'
          - type: 'null'
        evening_routine:
          anyOf:
          - $ref: '#/components/schemas/PhaseRoutine'
          - type: 'null'
        products:
          items:
            $ref: '#/components/schemas/SlotProduct'
          type: array
          title: Products
          description: Deprecated flat list for backward compatibility.
        missing_slots:
          items:
            type: string
          type: array
          title: Missing Slots
          description: Deprecated aggregate missing slots.
        notes:
          items:
            type: string
          type: array
          title: Notes
          description: Deprecated aggregate notes.
        alternative_retailers:
          items:
            type: string
          type: array
          title: Alternative Retailers
        retailer_link:
          anyOf:
          - $ref: '#/components/schemas/RetailerLinkResponse'
          - type: 'null'
        alternative_retailer_links:
          items:
            $ref: '#/components/schemas/RetailerLinkResponse'
          type: array
          title: Alternative Retailer Links
        retinol_disclaimer_required:
          type: boolean
          title: Retinol Disclaimer Required
          default: false
        retinol_disclaimer:
          anyOf:
          - type: string
          - type: 'null'
          title: Retinol Disclaimer
        feedback_cta_text:
          type: string
          title: Feedback Cta Text
          default: Părerea ta contează! Spune-ne cum ți s-a părut experiența și ajută-ne
            să o facem și mai bună :apasă aici!
        debug:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Debug
      type: object
      required:
      - status
      - retailer
      - priority_need
      - skin_type
      title: RoutineResponse
    RoutineScores:
      properties:
        Ten tern:
          anyOf:
          - type: integer
            maximum: 100.0
            minimum: 1.0
          - type: 'null'
          title: Ten Tern
        Deshidratare:
          anyOf:
          - type: integer
            maximum: 100.0
            minimum: 1.0
          - type: 'null'
          title: Deshidratare
        Acnee:
          anyOf:
          - type: integer
            maximum: 100.0
            minimum: 1.0
          - type: 'null'
          title: Acnee
        Ten neuniform:
          anyOf:
          - type: integer
            maximum: 100.0
            minimum: 1.0
          - type: 'null'
          title: Ten Neuniform
        Imperfectiuni:
          anyOf:
          - type: integer
            maximum: 100.0
            minimum: 1.0
          - type: 'null'
          title: Imperfectiuni
        Riduri/linii fine:
          anyOf:
          - type: integer
            maximum: 100.0
            minimum: 1.0
          - type: 'null'
          title: Riduri/Linii Fine
          description: Include this score whenever wrinkles are estimated. Values
            above 60 enable evening retinol selection.
        Ochi obositi/umflati:
          anyOf:
          - type: integer
            maximum: 100.0
            minimum: 1.0
          - type: 'null'
          title: Ochi Obositi/Umflati
        Roseata:
          anyOf:
          - type: integer
            maximum: 100.0
            minimum: 1.0
          - type: 'null'
          title: Roseata
        Pete pigmentare:
          anyOf:
          - type: integer
            maximum: 100.0
            minimum: 1.0
          - type: 'null'
          title: Pete Pigmentare
      additionalProperties: false
      type: object
      title: RoutineScores
      description: Estimated severity scores from 1 to 100. Use the canonical Romanian
        keys exactly as listed here. Always include 'Riduri/linii fine' when you estimate
        wrinkles; values above 60 allow PM-only retinol.
      examples:
      - Imperfectiuni: 61
        Ochi obositi/umflati: 34
        Riduri/linii fine: 72
      - Riduri/linii fine: 61
    SlotProduct:
      properties:
        slot:
          type: string
          enum:
          - Curatare
          - Ochi
          - Ser
          - Produs problema
          - Hidratare
          - Soare
          title: Slot
        phase:
          type: string
          enum:
          - AM
          - PM
          title: Phase
        id_produs:
          type: string
          title: Id Produs
        nume_produs:
          type: string
          title: Nume Produs
        tip_produs:
          type: string
          title: Tip Produs
        matched_need:
          anyOf:
          - type: string
          - type: 'null'
          title: Matched Need
        notes:
          items:
            type: string
          type: array
          title: Notes
      type: object
      required:
      - slot
      - phase
      - id_produs
      - nume_produs
      - tip_produs
      title: SlotProduct
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
servers:
- url: https://revox-api-q3d5yfy7ma-ew.a.run.app
